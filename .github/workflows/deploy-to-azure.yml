name: Deploy to Azure Blob Storage

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_STORAGE_CONTAINER: '$web'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Validate required secrets
      run: |
        if [ -z "${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}" ]; then
          echo "❌ AZURE_STORAGE_ACCOUNT_NAME secret is not set"
          exit 1
        fi
        if [ -z "${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}" ]; then
          echo "❌ AZURE_STORAGE_ACCOUNT_KEY secret is not set"
          exit 1
        fi
        echo "✅ Required secrets are configured"
        
    - name: Prepare files for deployment
      run: |
        echo "📦 Preparing files for deployment..."
        
        # Create dist directory
        mkdir -p dist
        
        # Copy main HTML file as index.html
        cp bjj-tracker.html dist/index.html
        echo "✅ Copied bjj-tracker.html to dist/index.html"
        
        # Copy error page
        if [ -f "error.html" ]; then
          cp error.html dist/error.html
          echo "✅ Copied error.html"
        fi
        
        # Copy additional files
        if [ -f "README.md" ]; then
          cp README.md dist/
          echo "✅ Copied README.md"
        fi
        
        # List files to be deployed
        echo "📋 Files to be deployed:"
        ls -la dist/
        
    - name: Upload to Azure Blob Storage
      uses: azure/CLI@v1
      with:
        azcliversion: 2.45.0
        inlineScript: |
          echo "🚀 Starting upload to Azure Blob Storage..."
          
          # Upload files to Azure Blob Storage
          az storage blob upload-batch \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
            --account-key ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }} \
            --destination '$web' \
            --source dist/ \
            --overwrite \
            --content-type "text/html" \
            --pattern "*.html"
            
          # Upload other files with appropriate content types
          az storage blob upload-batch \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
            --account-key ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }} \
            --destination '$web' \
            --source dist/ \
            --overwrite \
            --pattern "*.md"
            
          echo "✅ Files uploaded successfully to Azure Blob Storage"
          
          # Get the static website URL
          STATIC_WEBSITE_URL=$(az storage account show \
            --name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
            --query "primaryEndpoints.web" \
            --output tsv)
            
          echo "🌐 Static website URL: $STATIC_WEBSITE_URL"
            
    - name: Purge Azure CDN (optional)
      uses: azure/CLI@v1
      if: ${{ secrets.AZURE_CDN_PROFILE_NAME && secrets.AZURE_CDN_ENDPOINT_NAME }}
      with:
        azcliversion: 2.45.0
        inlineScript: |
          echo "🔄 Purging Azure CDN cache..."
          
          az cdn endpoint purge \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_CDN_ENDPOINT_NAME }} \
            --profile-name ${{ secrets.AZURE_CDN_PROFILE_NAME }} \
            --content-paths "/*"
            
          echo "✅ CDN cache purged successfully"
          
    - name: Deployment Summary
      run: |
        echo "🎉 Deployment completed successfully!"
        echo "📊 Deployment Summary:"
        echo "   • Files deployed to Azure Blob Storage"
        echo "   • Static website hosting enabled"
        echo "   • Content accessible via Azure CDN (if configured)"