name: Deploy to Netlify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # CI Job - Lint and validate files
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML files
        run: |
          echo "🔍 Validating HTML files..."

          # Check if main files exist
          if [ ! -f "bjj-tracker.html" ]; then
            echo "❌ bjj-tracker.html not found"
            exit 1
          fi

          if [ ! -f "index.html" ]; then
            echo "❌ index.html not found"
            exit 1
          fi

          # Basic HTML validation (check for DOCTYPE and required tags)
          for file in bjj-tracker.html index.html; do
            echo "Validating $file..."

            if ! grep -q "<!DOCTYPE html>" "$file"; then
              echo "❌ $file missing DOCTYPE declaration"
              exit 1
            fi

            if ! grep -q "<html" "$file"; then
              echo "❌ $file missing html tag"
              exit 1
            fi

            if ! grep -q "<head>" "$file"; then
              echo "❌ $file missing head tag"
              exit 1
            fi

            if ! grep -q "<body>" "$file"; then
              echo "❌ $file missing body tag"
              exit 1
            fi

            echo "✅ $file is valid"
          done

          echo "✅ All HTML files validated successfully"

      - name: Check file integrity
        run: |
          echo "🔍 Checking file integrity..."

          # Ensure index.html and bjj-tracker.html are identical
          if ! cmp -s bjj-tracker.html index.html; then
            echo "⚠️  Warning: bjj-tracker.html and index.html differ"
            echo "Files should be identical for proper deployment"
          else
            echo "✅ index.html and bjj-tracker.html are identical"
          fi

          # Check file sizes
          echo "📊 File sizes:"
          ls -lh *.html

      - name: Lint and format check
        run: |
          echo "🧹 Running basic file checks..."

          # Check for common issues
          echo "Checking for common HTML issues..."

          # Check for mixed line endings
          if file *.html | grep -q "CRLF"; then
            echo "⚠️  Warning: CRLF line endings detected. Consider using LF."
          fi

          # Check file encoding
          if ! file *.html | grep -q "UTF-8"; then
            echo "⚠️  Warning: Non-UTF-8 encoding detected"
          fi

          echo "✅ Basic lint checks completed"

  deploy:
    name: Deploy to Netlify
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Netlify CLI
        run: npm install --global netlify-cli@latest

      - name: Validate Netlify secrets
        run: |
          if [ -z "${{ secrets.NETLIFY_AUTH_TOKEN }}" ]; then
            echo "❌ NETLIFY_AUTH_TOKEN secret is not set"
            echo "Please add your Netlify authentication token to repository secrets"
            exit 1
          fi

          if [ -z "${{ secrets.NETLIFY_SITE_ID }}" ]; then
            echo "❌ NETLIFY_SITE_ID secret is not set"
            echo "Please add your Netlify site ID to repository secrets"
            exit 1
          fi

          echo "✅ All required Netlify secrets are configured"

      - name: Prepare deployment files
        run: |
          echo "📦 Preparing files for deployment..."

          # Create publish directory
          mkdir -p dist

          # Copy main HTML files
          cp bjj-tracker.html dist/index.html
          echo "✅ Copied bjj-tracker.html to dist/index.html"

          # Copy error page if it exists
          if [ -f "error.html" ]; then
            cp error.html dist/
            echo "✅ Copied error.html"
          fi

          # List files to be deployed
          echo "📋 Files to be deployed:"
          ls -la dist/

      - name: Deploy to Netlify (Preview)
        if: github.event_name == 'pull_request'
        run: |
          echo "🚀 Deploying to Netlify (Preview)..."
          
          netlify deploy \
            --dir=dist \
            --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} \
            --site=${{ secrets.NETLIFY_SITE_ID }} \
            --json > deployment-info.json

          # Extract deployment URL
          DEPLOYMENT_URL=$(cat deployment-info.json | jq -r '.deploy_url')
          echo "🌐 Preview deployment URL: $DEPLOYMENT_URL"

          # Save deployment URL for potential use in comments
          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> $GITHUB_ENV

      - name: Deploy to Netlify (Production)
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          echo "🚀 Deploying to Netlify (Production)..."
          
          netlify deploy \
            --dir=dist \
            --prod \
            --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} \
            --site=${{ secrets.NETLIFY_SITE_ID }} \
            --json > deployment-info.json

          # Extract deployment URL
          DEPLOYMENT_URL=$(cat deployment-info.json | jq -r '.url')
          echo "🌐 Production deployment URL: $DEPLOYMENT_URL"

          # Save deployment URL
          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> $GITHUB_ENV

      - name: Deployment Summary
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "📊 Deployment Summary:"
          echo "   • Platform: Netlify"
          echo "   • Environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Preview' }}"
          echo "   • URL: ${{ env.DEPLOYMENT_URL }}"
          echo "   • Commit: ${{ github.sha }}"
          echo "   • Branch: ${{ github.ref_name }}"

      - name: Verify deployment
        run: |
          echo "🔍 Verifying deployment..."

          # Basic health check
          if [ -n "${{ env.DEPLOYMENT_URL }}" ]; then
            echo "Checking if deployment is accessible..."
            curl -sSf "${{ env.DEPLOYMENT_URL }}" > /dev/null && echo "✅ Deployment is accessible" || echo "⚠️  Deployment may not be immediately accessible"
          fi