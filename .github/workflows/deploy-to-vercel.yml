name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # CI Job - Lint and validate files
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML files
        run: |
          echo "🔍 Validating HTML files..."

          # Check if main files exist
          if [ ! -f "bjj-tracker.html" ]; then
            echo "❌ bjj-tracker.html not found"
            exit 1
          fi

          if [ ! -f "index.html" ]; then
            echo "❌ index.html not found"
            exit 1
          fi

          # Basic HTML validation (check for DOCTYPE and required tags)
          for file in bjj-tracker.html index.html; do
            echo "Validating $file..."

            if ! grep -q "<!DOCTYPE html>" "$file"; then
              echo "❌ $file missing DOCTYPE declaration"
              exit 1
            fi

            if ! grep -q "<html" "$file"; then
              echo "❌ $file missing html tag"
              exit 1
            fi

            if ! grep -q "<head>" "$file"; then
              echo "❌ $file missing head tag"
              exit 1
            fi

            if ! grep -q "<body>" "$file"; then
              echo "❌ $file missing body tag"
              exit 1
            fi

            echo "✅ $file is valid"
          done

          echo "✅ All HTML files validated successfully"

      - name: Check file integrity
        run: |
          echo "🔍 Checking file integrity..."

          # Ensure index.html and bjj-tracker.html are identical
          if ! cmp -s bjj-tracker.html index.html; then
            echo "⚠️  Warning: bjj-tracker.html and index.html differ"
            echo "Files should be identical for proper deployment"
          else
            echo "✅ index.html and bjj-tracker.html are identical"
          fi

          # Check file sizes
          echo "📊 File sizes:"
          ls -lh *.html

      - name: Lint and format check
        run: |
          echo "🧹 Running basic file checks..."

          # Check for common issues
          echo "Checking for common HTML issues..."

          # Check for mixed line endings
          if file *.html | grep -q "CRLF"; then
            echo "⚠️  Warning: CRLF line endings detected. Consider using LF."
          fi

          # Check file encoding
          if ! file *.html | grep -q "UTF-8"; then
            echo "⚠️  Warning: Non-UTF-8 encoding detected"
          fi

          echo "✅ Basic lint checks completed"

  deploy:
    name: Deploy to Vercel
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate Vercel secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "❌ VERCEL_TOKEN secret is not set"
            echo "Please add your Vercel token to repository secrets"
            exit 1
          fi

          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "❌ VERCEL_ORG_ID secret is not set"
            echo "Please add your Vercel organization ID to repository secrets"
            exit 1
          fi

          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "❌ VERCEL_PROJECT_ID secret is not set"
            echo "Please add your Vercel project ID to repository secrets"
            exit 1
          fi

          echo "✅ All required Vercel secrets are configured"

      - name: Prepare deployment files
        run: |
          echo "📦 Preparing files for deployment..."

          # Ensure index.html is the main entry point
          if [ -f "bjj-tracker.html" ] && [ -f "index.html" ]; then
            # If they're different, copy bjj-tracker.html to index.html
            if ! cmp -s bjj-tracker.html index.html; then
              echo "🔄 Syncing bjj-tracker.html to index.html"
              cp bjj-tracker.html index.html
            fi
          elif [ -f "bjj-tracker.html" ] && [ ! -f "index.html" ]; then
            echo "🔄 Creating index.html from bjj-tracker.html"
            cp bjj-tracker.html index.html
          fi

          # List files to be deployed
          echo "📋 Files to be deployed:"
          ls -la *.html *.json 2>/dev/null || true

      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request'
        run: |
          echo "🚀 Deploying to Vercel (Preview)..."
          vercel deploy --token=${{ secrets.VERCEL_TOKEN }} > deployment-url.txt

          DEPLOYMENT_URL=$(cat deployment-url.txt)
          echo "🌐 Preview deployment URL: $DEPLOYMENT_URL"

          # Save deployment URL for potential use in comments
          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> $GITHUB_ENV

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          echo "🚀 Deploying to Vercel (Production)..."
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} > deployment-url.txt

          DEPLOYMENT_URL=$(cat deployment-url.txt)
          echo "🌐 Production deployment URL: $DEPLOYMENT_URL"

          # Save deployment URL
          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> $GITHUB_ENV

      - name: Deployment Summary
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "📊 Deployment Summary:"
          echo "   • Platform: Vercel"
          echo "   • Environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Preview' }}"
          echo "   • URL: ${{ env.DEPLOYMENT_URL }}"
          echo "   • Commit: ${{ github.sha }}"
          echo "   • Branch: ${{ github.ref_name }}"

      - name: Verify deployment
        run: |
          echo "🔍 Verifying deployment..."

          # Basic health check
          if [ -n "${{ env.DEPLOYMENT_URL }}" ]; then
            echo "Checking if deployment is accessible..."
            curl -sSf "${{ env.DEPLOYMENT_URL }}" > /dev/null && echo "✅ Deployment is accessible" || echo "⚠️  Deployment may not be immediately accessible"
          fi